env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint api/ with flake8
        run: flake8 api/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Lint worker/ with flake8
        run: flake8 worker/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install ESLint
        working-directory: frontend
        run: npm install --save-dev eslint@8

      - name: Lint frontend with ESLint
        working-directory: frontend
        run: npx eslint app.js

      - name: Lint api/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ====================== STAGE 2: TEST ======================
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: api
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            api/htmlcov/
            api/coverage.xml
          retention-days: 30

  # ====================== STAGE 3: BUILD ======================
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ steps.sha.outputs.short }}
            localhost:5000/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ steps.sha.outputs.short }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ steps.sha.outputs.short }}
            localhost:5000/frontend:latest

      - name: Save images as tarballs
        run: |
          mkdir -p /tmp/images
          for svc in api worker frontend; do
            docker pull localhost:5000/$svc:${{ steps.sha.outputs.short }}
            docker save localhost:5000/$svc:${{ steps.sha.outputs.short }} -o /tmp/images/$svc.tar
          done
          ls -lh /tmp/images/

      - name: Upload image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/
          retention-days: 1

      - name: Save short SHA for downstream jobs
        run: echo "${{ steps.sha.outputs.short }}" > sha.txt

      - name: Upload SHA
        uses: actions/upload-artifact@v4
        with:
          name: sha
          path: sha.txt
          retention-days: 1

  # ====================== STAGE 4: SECURITY SCAN ======================
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/

      - name: Load images into Docker
        run: |
          for tar in /tmp/images/*.tar; do
            docker load -i "$tar"
          done
          docker images

      - name: Download SHA
        uses: actions/download-artifact@v4
        with:
          name: sha

      - name: Set SHORT_SHA env var
        run: echo "SHORT_SHA=$(cat sha.txt)" >> $GITHUB_ENV

      - name: Scan api image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: localhost:5000/api:${{ env.SHORT_SHA }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: localhost:5000/worker:${{ env.SHORT_SHA }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: localhost:5000/frontend:${{ env.SHORT_SHA }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-*.sarif
          retention-days: 30
