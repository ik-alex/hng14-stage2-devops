name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ====================== STAGE 1: LINT ======================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint api/ with flake8
        run: flake8 api/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Lint worker/ with flake8
        run: flake8 worker/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install ESLint
        working-directory: frontend
        run: npm install --save-dev eslint@8

      - name: Lint frontend with ESLint
        working-directory: frontend
        run: npx eslint app.js

      - name: Lint api/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ====================== STAGE 2: TEST ======================
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: api
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            api/htmlcov/
            api/coverage.xml
          retention-days: 30

  # ====================== STAGE 3: BUILD ======================
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ steps.sha.outputs.short }}
            localhost:5000/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ steps.sha.outputs.short }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ steps.sha.outputs.short }}
            localhost:5000/frontend:latest

      - name: Save images as tarballs
        run: |
          mkdir -p /tmp/images
          for svc in api worker frontend; do
            docker pull localhost:5000/$svc:${{ steps.sha.outputs.short }}
            docker save localhost:5000/$svc:${{ steps.sha.outputs.short }} -o /tmp/images/$svc.tar
          done
          ls -lh /tmp/images/

      - name: Upload image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/
          retention-days: 1

      - name: Save short SHA for downstream jobs
        run: echo "${{ steps.sha.outputs.short }}" > sha.txt

      - name: Upload SHA
        uses: actions/upload-artifact@v4
        with:
          name: sha
          path: sha.txt
          retention-days: 1

  # ====================== STAGE 4: SECURITY SCAN ======================
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/

      - name: Load images into Docker
        run: |
          for tar in /tmp/images/*.tar; do
            docker load -i "$tar"
          done
          docker images

      - name: Download SHA
        uses: actions/download-artifact@v4
        with:
          name: sha

      - name: Set SHORT_SHA env var
        run: echo "SHORT_SHA=$(cat sha.txt)" >> $GITHUB_ENV

      # ---------- api ----------
      - name: Show api findings (table, does not fail)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/api:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - name: Scan api image (SARIF, fails on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/api:${{ env.SHORT_SHA }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          limit-severities-for-sarif: true
          skip-setup-trivy: true

      # ---------- worker ----------
      - name: Show worker findings (table, does not fail)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/worker:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL
          exit-code: "0"
          ignore-unfixed: true
          skip-setup-trivy: true

      - name: Scan worker image (SARIF, fails on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/worker:${{ env.SHORT_SHA }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          limit-severities-for-sarif: true
          skip-setup-trivy: true

      # ---------- frontend ----------
      - name: Show frontend findings (table, does not fail)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/frontend:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL
          exit-code: "0"
          ignore-unfixed: true
          skip-setup-trivy: true

      - name: Scan frontend image (SARIF, fails on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/frontend:${{ env.SHORT_SHA }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          limit-severities-for-sarif: true
          skip-setup-trivy: true

      - name: Upload SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-*.sarif
          retention-days: 30

  # ====================== STAGE 5: INTEGRATION TEST ======================
  integration-test:
    name: Integration Test
    needs: security-scan
    runs-on: ubuntu-latest
    env:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/

      - name: Load images into Docker
        run: |
          for tar in /tmp/images/*.tar; do
            docker load -i "$tar"
          done
          docker images

      - name: Download SHA
        uses: actions/download-artifact@v4
        with:
          name: sha

      - name: Set SHORT_SHA env var
        run: echo "SHORT_SHA=$(cat sha.txt)" >> $GITHUB_ENV

      - name: Create compose override using built images
        run: |
          cat > docker-compose.override.yml <<EOF
          services:
            api:
              image: localhost:5000/api:${SHORT_SHA}
              pull_policy: never
              build: null
            worker:
              image: localhost:5000/worker:${SHORT_SHA}
              pull_policy: never
              build: null
            frontend:
              image: localhost:5000/frontend:${SHORT_SHA}
              pull_policy: never
              build: null
          EOF
          cat docker-compose.override.yml

      - name: Start the stack
        run: docker compose up -d

      - name: Wait for services to become healthy
        run: |
          echo "Waiting for services to become healthy..."
          for i in $(seq 1 30); do
            API_HEALTHY=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api) 2>/dev/null || echo "starting")
            FRONTEND_UP=$(curl -sf http://localhost:3000/ > /dev/null 2>&1 && echo "yes" || echo "no")
            echo "  Attempt $i/30: api=$API_HEALTHY frontend=$FRONTEND_UP"
            if [ "$API_HEALTHY" = "healthy" ] && [ "$FRONTEND_UP" = "yes" ]; then
              echo "All services healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Services failed to become healthy within 60 seconds"
          exit 1

      - name: Run integration test
        run: ./scripts/integration-test.sh

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  # ====================== STAGE 6: DEPLOY ======================
  deploy:
    name: Deploy
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/

      - name: Load images into Docker
        run: |
          for tar in /tmp/images/*.tar; do
            docker load -i "$tar"
          done

      - name: Download SHA
        uses: actions/download-artifact@v4
        with:
          name: sha

      - name: Set SHORT_SHA env var
        run: echo "SHORT_SHA=$(cat sha.txt)" >> $GITHUB_ENV

      - name: Create Docker network
        run: docker network create app-net

      - name: Start Redis (dependency of api)
        run: |
          docker run -d \
            --name redis-server \
            --network app-net \
            --health-cmd "redis-cli -a ${REDIS_PASSWORD} ping" \
            --health-interval=5s \
            --health-timeout=3s \
            --health-retries=3 \
            redis:7-alpine redis-server --requirepass "${REDIS_PASSWORD}"

          # Wait for Redis to be ready
          for i in $(seq 1 30); do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' redis-server)" = "healthy" ]; then
              echo "Redis ready"
              exit 0
            fi
            sleep 1
          done
          echo "Redis failed to become healthy"
          exit 1

      - name: Simulate existing deployment (v1 of api)
        run: |
          echo "Starting 'old' api container (simulating previously deployed version)"
          docker run -d \
            --name api \
            --network app-net \
            -e REDIS_HOST=redis-server \
            -e REDIS_PORT=6379 \
            -e REDIS_PASSWORD="${REDIS_PASSWORD}" \
            -p 8000:8000 \
            localhost:5000/api:${SHORT_SHA}

          echo "Waiting for old api to be healthy..."
          for i in $(seq 1 30); do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' api)" = "healthy" ]; then
              echo "Old api ready"
              exit 0
            fi
            sleep 1
          done
          echo "Old api failed to become healthy"
          exit 1

      - name: Run rolling update
        run: |
          ./scripts/deploy.sh \
            localhost:5000/api:${SHORT_SHA} \
            api \
            8000 \
            /healthz

      - name: Verify new deployment
        run: |
          echo "Final container state:"
          docker ps
          echo ""
          echo "Health status:"
          docker inspect --format='{{.Name}}: {{.State.Health.Status}}' api

      - name: Cleanup
        if: always()
        run: |
          docker rm -f api api-new redis-server 2>/dev/null || true
          docker network rm app-net 2>/dev/null || true
